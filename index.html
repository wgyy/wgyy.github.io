<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亲爱的大白，情人节快乐</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #1a0a0a 0%, #000000 100%);
            overflow: hidden;
            position: relative;
        }

        /* 星光背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 飘落的花瓣 */
        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: linear-gradient(135deg, #ff3366 0%, #ff69b4 100%);
            border-radius: 100% 0% 100% 0%;
            opacity: 0.7;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 主标题 */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 6vw, 4rem);
            font-weight: 600;
            color: #fff;
            text-align: center;
            z-index: 10;
            text-shadow:
                0 0 20px rgba(255, 51, 102, 0.8),
                0 0 40px rgba(255, 51, 102, 0.5),
                0 0 60px rgba(255, 51, 102, 0.3);
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
            position: absolute;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .title.fade-out {
            animation: fadeIn 1.5s ease-out forwards,
                       fadeOut 2s ease-in 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); filter: blur(0); }
            100% { opacity: 0; transform: scale(1.3); filter: blur(10px); }
        }

        /* 爱心容器 */
        .hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
        }

        .hearts-container.show {
            opacity: 1;
            animation: showHearts 1s ease-out 5s forwards;
        }

        @keyframes showHearts {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 爱心 */
        .heart {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff3366, #ff69b4);
            transform: rotate(45deg);
            animation: heartbeat 1.2s ease-in-out infinite;
            box-shadow:
                0 0 20px rgba(255, 51, 102, 0.6),
                0 0 40px rgba(255, 105, 180, 0.4);
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff3366, #ff69b4);
            border-radius: 50%;
        }

        .heart::before {
            top: -30px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: -30px;
        }

        @keyframes heartbeat {
            0% { transform: rotate(45deg) scale(1); }
            15% { transform: rotate(45deg) scale(1.3); }
            30% { transform: rotate(45deg) scale(1); }
            45% { transform: rotate(45deg) scale(1.2); }
            60% { transform: rotate(45deg) scale(1); }
            100% { transform: rotate(45deg) scale(1); }
        }

        /* 多余的爱心 */
        .extra-heart {
            position: absolute;
            animation: floatHeart 3s ease-in-out infinite;
        }

        .extra-heart:nth-child(1) {
            top: 20%;
            left: 15%;
            width: 30px;
            height: 30px;
            animation-delay: 0s;
        }

        .extra-heart:nth-child(2) {
            top: 25%;
            right: 20%;
            width: 25px;
            height: 25px;
            animation-delay: 0.5s;
        }

        .extra-heart:nth-child(3) {
            bottom: 25%;
            left: 20%;
            width: 35px;
            height: 35px;
            animation-delay: 1s;
        }

        .extra-heart:nth-child(4) {
            bottom: 20%;
            right: 15%;
            width: 28px;
            height: 28px;
            animation-delay: 1.5s;
        }

        .extra-heart:nth-child(5) {
            top: 40%;
            left: 10%;
            width: 20px;
            height: 20px;
            animation-delay: 0.3s;
        }

        .extra-heart:nth-child(6) {
            top: 35%;
            right: 12%;
            width: 22px;
            height: 22px;
            animation-delay: 0.8s;
        }

        .extra-heart:nth-child(7) {
            bottom: 30%;
            left: 12%;
            width: 24px;
            height: 24px;
            animation-delay: 1.2s;
        }

        .extra-heart:nth-child(8) {
            bottom: 35%;
            right: 10%;
            width: 26px;
            height: 26px;
            animation-delay: 1.8s;
        }

        .extra-heart::before,
        .extra-heart::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff69b4, #ff3366);
            border-radius: 50%;
        }

        .extra-heart::before {
            top: -50%;
            left: 0;
        }

        .extra-heart::after {
            top: 0;
            left: -50%;
        }

        @keyframes floatHeart {
            0%, 100% {
                transform: rotate(45deg) translateY(0) scale(1);
                opacity: 0.6;
            }
            50% {
                transform: rotate(45deg) translateY(-20px) scale(1.1);
                opacity: 1;
            }
        }

        /* 中心爱心的额外光晕 */
        .center-heart-glow {
            position: absolute;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(255, 51, 102, 0.3) 0%, transparent 70%);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <!-- 星光背景 -->
    <div class="stars" id="stars"></div>

    <!-- 飘落的花瓣 -->
    <div class="petals" id="petals"></div>

    <!-- 主标题 -->
    <h1 class="title" id="title">亲爱的大白，情人节快乐</h1>

    <!-- 爱心动画 -->
    <div class="hearts-container" id="heartsContainer">
        <div class="center-heart-glow"></div>
        <div class="heart"></div>
        <div class="extra-heart"></div>
        <div class="extra-heart"></div>
        <div class="extra-heart"></div>
        <div class="extra-heart"></div>
        <div class="extra-heart"></div>
        <div class="extra-heart"></div>
        <div class="extra-heart"></div>
    </div>

    <script>
        // 创建星光
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (1.5 + Math.random()) + 's';
                starsContainer.appendChild(star);
            }
        }

        // 创建花瓣
        function createPetals() {
            const petalsContainer = document.getElementById('petals');
            for (let i = 0; i < 30; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = (8 + Math.random() * 10) + 's';
                petal.style.animationDelay = Math.random() * 10 + 's';
                petal.style.opacity = 0.4 + Math.random() * 0.4;
                petal.style.transform = `scale(${0.5 + Math.random() * 0.8})`;
                petalsContainer.appendChild(petal);
            }
        }

        // 控制动画流程
        function initAnimation() {
            const title = document.getElementById('title');
            const heartsContainer = document.getElementById('heartsContainer');

            // 3秒后标题开始消失
            setTimeout(() => {
                title.style.animation = 'fadeOut 2s ease-in forwards';
            }, 3000);

            // 5秒后显示爱心
            setTimeout(() => {
                heartsContainer.classList.add('show');
            }, 5000);
        }

        // 初始化
        createStars();
        createPetals();
        initAnimation();
    </script>
</body>
</html>
