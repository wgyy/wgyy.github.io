<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亲爱的大白，情人节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Playfair Display', serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(1.5rem, 5vw, 3.5rem);
            font-weight: 600;
            color: #fff;
            text-align: center;
            z-index: 100;
            text-shadow:
                0 0 20px rgba(255, 51, 102, 0.9),
                0 0 40px rgba(255, 51, 102, 0.6),
                0 0 60px rgba(255, 51, 102, 0.3);
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .title.fade-out {
            animation: fadeOut 2s ease-in forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3); filter: blur(15px); }
        }

        /* 花瓣样式 */
        .petal {
            position: fixed;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #ff3366 0%, #ff69b4 100%);
            border-radius: 100% 0% 100% 0%;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="title" id="title">亲爱的大白，情人节快乐</div>
    <div id="canvas-container"></div>
    <div id="petals"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 创建花瓣
        function createPetals() {
            const petalsContainer = document.getElementById('petals');
            for (let i = 0; i < 25; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.style.left = Math.random() * 100 + '%';
                petal.style.animationDuration = (10 + Math.random() * 8) + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                petal.style.opacity = 0.5 + Math.random() * 0.4;
                petal.style.transform = `scale(${0.5 + Math.random() * 0.6})`;
                petalsContainer.appendChild(petal);
            }
        }
        createPetals();

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        camera.position.z = 40;

        // 粒子数量
        const particleCount = 2500;

        // 心形函数
        function getHeartPosition(t, scale = 1) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return new THREE.Vector3(x * scale, y * scale, 0);
        }

        // 目标位置（心形）
        const targetPositions = new Float32Array(particleCount * 3);
        // 起始位置（从四面八方）
        const startPositions = new Float32Array(particleCount * 3);
        // 当前位置
        const currentPositions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        let idx = 0;
        const scale = 0.7;

        for (let i = 0; i < particleCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const heartPos = getHeartPosition(t, scale);

            // 心形内部填充
            const offsetX = (Math.random() - 0.5) * 2;
            const offsetY = (Math.random() - 0.5) * 2;
            const offsetZ = (Math.random() - 0.5) * 2;

            const tx = heartPos.x + offsetX;
            const ty = heartPos.y + offsetY;
            const tz = heartPos.z + offsetZ;

            // 目标位置
            targetPositions[idx] = tx;
            targetPositions[idx + 1] = ty;
            targetPositions[idx + 2] = tz;

            // 起始位置 - 从很远的地方随机
            const startRadius = 30 + Math.random() * 20;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;

            startPositions[idx] = startRadius * Math.sin(phi) * Math.cos(theta);
            startPositions[idx + 1] = startRadius * Math.sin(phi) * Math.sin(theta);
            startPositions[idx + 2] = startRadius * Math.cos(phi);

            // 初始位置
            currentPositions[idx] = startPositions[idx];
            currentPositions[idx + 1] = startPositions[idx + 1];
            currentPositions[idx + 2] = startPositions[idx + 2];

            // 颜色
            const colorChoice = Math.random();
            let color;
            if (colorChoice < 0.3) {
                color = new THREE.Color(0xff0044);
            } else if (colorChoice < 0.7) {
                color = new THREE.Color(0xff3366);
            } else {
                color = new THREE.Color(0xff69b4);
            }

            colors[idx] = color.r;
            colors[idx + 1] = color.g;
            colors[idx + 2] = color.b;

            sizes[i] = Math.random() * 0.3 + 0.15;
            idx += 3;
        }

        const particlesGeometry = new THREE.BufferGeometry();
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particlesGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.4,
            vertexColors: true,
            transparent: true,
            opacity: 0,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // 外层光晕
        const glowCount = 400;
        const glowGeometry = new THREE.BufferGeometry();
        const glowPositions = new Float32Array(glowCount * 3);
        const glowStartPositions = new Float32Array(glowCount * 3);
        const glowColors = new Float32Array(glowCount * 3);

        for (let i = 0; i < glowCount; i++) {
            const t = Math.random() * Math.PI * 2;
            const heartPos = getHeartPosition(t, scale * 1.3);

            const gx = heartPos.x + (Math.random() - 0.5) * 2;
            const gy = heartPos.y + (Math.random() - 0.5) * 2;
            const gz = heartPos.z + (Math.random() - 0.5) * 2 - 3;

            glowPositions[i * 3] = gx;
            glowPositions[i * 3 + 1] = gy;
            glowPositions[i * 3 + 2] = gz;

            // 光晕起始位置
            const glowStartRadius = 25 + Math.random() * 15;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;

            glowStartPositions[i * 3] = glowStartRadius * Math.sin(phi) * Math.cos(theta);
            glowStartPositions[i * 3 + 1] = glowStartRadius * Math.sin(phi) * Math.sin(theta);
            glowStartPositions[i * 3 + 2] = glowStartRadius * Math.cos(phi);

            const glowColor = new THREE.Color(0xff69b4);
            glowColors[i * 3] = glowColor.r;
            glowColors[i * 3 + 1] = glowColor.g;
            glowColors[i * 3 + 2] = glowColor.b;
        }

        glowGeometry.setAttribute('position', new THREE.BufferAttribute(glowPositions, 3));
        glowGeometry.setAttribute('color', new THREE.BufferAttribute(glowColors, 3));

        const glowMaterial = new THREE.PointsMaterial({
            size: 0.7,
            vertexColors: true,
            transparent: true,
            opacity: 0,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        const glowParticles = new THREE.Points(glowGeometry, glowMaterial);
        scene.add(glowParticles);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        // 动画状态
        let time = 0;
        let animationStartTime = 0;
        let animationStarted = false;
        const animationDuration = 4; // 汇聚动画4秒

        // 缓动函数
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        // 心跳 - 每5秒跳动一次
        function getHeartbeat(t) {
            const beatPeriod = 5; // 5秒一个完整周期
            const phase = (t % beatPeriod) / beatPeriod; // 0 到 1
            // 缓慢的收缩舒张
            return Math.sin(phase * Math.PI * 2) * 0.04;
        }

        function animate() {
            requestAnimationFrame(animate);

            // 第一次调用时开始动画
            if (!animationStarted) {
                animationStarted = true;
                animationStartTime = time;
            }

            const animTime = time - animationStartTime;
            const animProgress = Math.min(animTime / animationDuration, 1);
            const easedProgress = easeOutCubic(animProgress);

            // 粒子汇聚动画
            const posArray = particlesGeometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                posArray[i3] = startPositions[i3] + (targetPositions[i3] - startPositions[i3]) * easedProgress;
                posArray[i3 + 1] = startPositions[i3 + 1] + (targetPositions[i3 + 1] - startPositions[i3 + 1]) * easedProgress;
                posArray[i3 + 2] = startPositions[i3 + 2] + (targetPositions[i3 + 2] - startPositions[i3 + 2]) * easedProgress;
            }
            particlesGeometry.attributes.position.needsUpdate = true;

            // 光晕汇聚
            const glowArray = glowGeometry.attributes.position.array;
            for (let i = 0; i < glowCount; i++) {
                const i3 = i * 3;
                glowArray[i3] = glowStartPositions[i3] + (glowPositions[i3] - glowStartPositions[i3]) * easedProgress;
                glowArray[i3 + 1] = glowStartPositions[i3 + 1] + (glowPositions[i3 + 1] - glowStartPositions[i3 + 1]) * easedProgress;
                glowArray[i3 + 2] = glowStartPositions[i3 + 2] + (glowPositions[i3 + 2] - glowStartPositions[i3 + 2]) * easedProgress;
            }
            glowGeometry.attributes.position.needsUpdate = true;

            // 汇聚完成后开始心跳
            if (animProgress >= 1) {
                const heartbeatTime = animTime - animationDuration;
                const heartbeat = getHeartbeat(heartbeatTime);
                const currentScale = 1 + heartbeat;

                // 心跳时整体缩放
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    posArray[i3] = targetPositions[i3] * currentScale;
                    posArray[i3 + 1] = targetPositions[i3 + 1] * currentScale;
                    posArray[i3 + 2] = targetPositions[i3 + 2] * currentScale;
                }
                particlesGeometry.attributes.position.needsUpdate = true;

                // 发光强度
                particlesMaterial.opacity = 0.7 + heartbeat * 1.5;
                glowMaterial.opacity = 0.15 + heartbeat * 0.3;

                // 缓慢旋转
                particles.rotation.y = Math.sin(heartbeatTime * 0.1) * 0.1;
                glowParticles.rotation.y = particles.rotation.y;
            } else {
                // 汇聚过程中
                particlesMaterial.opacity = easedProgress * 0.9;
                glowMaterial.opacity = easedProgress * 0.3;
            }

            time += 0.016;
            renderer.render(scene, camera);
        }

        // 标题控制
        const title = document.getElementById('title');

        setTimeout(() => {
            title.classList.add('fade-out');
        }, 6000);

        setTimeout(() => {
            title.style.display = 'none';
        }, 8000);

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
